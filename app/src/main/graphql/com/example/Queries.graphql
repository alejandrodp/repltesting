query patientList {
  patients {
    identification
    firstName
    lastName
    nationality
  	region {
      name
      country {
        name
      }
    }
    dateEntrance
    intensiveCareUnite
    age
		hospitalized
    pathologies {
      name
      treatment
      description
      symptoms
    }
    medication {
      name
      pharmaceutical
    }
    state
    contacts {
      contact {
        identification
        firstName
        lastName
      }
    }
  }
}

query pathologyList {
  pathologies {
    description
    name
    symptoms
    treatment
  }
}

query patientsReportList {
  patientsReport
}

query patientsStatesList {
  patientStates
}

query contactList {
  contacts {
    identification
    firstName
    lastName
    nationality
    origin {
      name
      country {
        name
      }
    }
    address
    email
    age
    pathologies {
      name
      description
      symptoms
      description
    }
  }
}

query contactVisitList {
  contactVisits {
    contact {
      identification
      firstName
      lastName
    }
    patient {
      identification
      firstName
      lastName
    }
    visitDate
  }
}
